<div class="filter-section mb-4">
    <form method="get" class="card card-body shadow-sm">
        <h5 class="card-title">Available filters</h5>
        <div class="row">
            {% for field in filter.form %}
                <div class="col-md-4 mb-2">
                    <label class="form-label font-weight-bold">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-filter"></i> Apply
            </button>
            <a href="{{ request.path }}" class="btn btn-outline-secondary">
                Clean
            </a>
        </div>
    </form>
</div>
