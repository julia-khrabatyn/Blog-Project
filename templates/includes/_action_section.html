{% load static %}
<section class="my-20 px-4">
    <div class="max-w-4xl mx-auto bg-sky-600 rounded-[2.5rem] p-10 md:p-16 text-center shadow-2xl shadow-sky-200 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-sky-500 rounded-full opacity-50"></div>
        
        <div class="relative z-10">
            <h2 class="text-3xl md:text-4xl font-black text-white mb-6">
               {{ title }}
            </h2>
            <p class="text-sky-100 text-lg mb-10 max-w-xl mx-auto font-medium">
                {{ subtitle }}
            </div>
            <div class="flex justify-center mt-6">
                <a href={{ url }} class="button-create-post">
                <span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        {{ button_text }}
                    </span>
                </a>
            </div>
        </div>
    </div>
</section>
